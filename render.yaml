databases:
  - name: gestor-eleitoral-db
    databaseName: gestor_eleitoral
    plan: basic-256mb

services:
  - type: web
    name: gestor-eleitoral-api
    runtime: node
    plan: starter
    buildCommand: npm ci --prefix Backend
    startCommand: npm run start:prod --prefix Backend
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: gestor-eleitoral-db
          property: connectionString
      - key: DB_SSL
        value: "false"
      - key: JWT_SECRET
        generateValue: true
      - key: MFA_ENCRYPTION_KEY
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 3600
      - key: JWT_ISSUER
        value: gestor-eleitoral-api
      - key: JWT_AUDIENCE
        value: gestor-eleitoral-web
      - key: TRUST_PROXY
        value: "true"
      - key: CORS_ORIGINS
        sync: false
      - key: WHATSAPP_SIMULATION_MODE
        value: "true"
      - key: ALLOW_PUBLIC_REGISTRATION
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: PASSWORD_RESET_FROM
        sync: false
      - key: ALERT_WEBHOOK_URL
        sync: false

  - type: web
    name: gestor-eleitoral-web
    runtime: static
    buildCommand: npm ci --prefix frontend && npm run build --prefix frontend
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: Referrer-Policy
        value: no-referrer
      - path: /*
        name: Strict-Transport-Security
        value: max-age=31536000
      - path: /*
        name: Permissions-Policy
        value: camera=(), microphone=(), geolocation=(), payment=(), usb=()
      - path: /*
        name: Cross-Origin-Opener-Policy
        value: same-origin
      - path: /*
        name: Cross-Origin-Resource-Policy
        value: same-origin
      - path: /*
        name: X-Permitted-Cross-Domain-Policies
        value: none
      - path: /*
        name: Content-Security-Policy
        value: "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'"
      - path: /index.html
        name: Cache-Control
        value: no-store
      - path: /api-config.js
        name: Cache-Control
        value: no-store
